    <style>
        :root { --w-blue: #1b6ec2; --bg: #f0f2f5; --green: #28a745; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .card { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--w-blue); color: white; padding: 18px 30px; font-size: 1.4rem; font-weight: bold; }
        .hero { padding: 30px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .total-val { font-size: 2.8rem; font-weight: 800; display: flex; align-items: center; gap: 15px; }
        .badge { background: #e6f7ed; color: var(--green); padding: 5px 12px; border-radius: 6px; font-size: 0.9rem; font-weight: bold; }
        .chart-box { display: flex; align-items: flex-end; gap: 10px; height: 90px; }
        .bar { width: 24px; background: #5a96d4; border-radius: 4px 4px 0 0; position: relative; opacity: 0.85; }
        .bar-label { position: absolute; bottom: -22px; left: -5px; width: 35px; font-size: 10px; text-align: center; color: #888; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 40px; color: #64748b; font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #edf2f7; background: #fcfcfc; }
        td { padding: 15px 40px; border-bottom: 1px solid #f1f5f9; font-size: 1.05rem; }
        .footer { padding: 25px 40px; display: flex; justify-content: space-between; background: #fff; border-top: 1px solid #eee; }
        .btn { background: var(--w-blue); color: white; border: none; padding: 12px 28px; border-radius: 8px; font-weight: bold; cursor: pointer; }

<body>
<div class="card">
    <div class="header">Total Dividends by Symbol</div>
    <div class="hero">
        <div>
            <div style="color:#64748b; font-size:1rem; margin-bottom:5px;">Total Portfolio Dividends</div>
            <div class="total-val">$<span id="grand">0.00</span> <small style="font-size:1.5rem;">CAD</small> <span class="badge">+5.2% (YTD)</span></div>
        </div>
        <div class="chart-box" id="barChart"></div>
    </div>
    <table>
        <thead><tr><th>Symbol</th><th>Company</th><th style="text-align:right">Total Earned (CAD)</th></tr></thead>
        <tbody id="rows"><tr><td colspan="3" style="text-align:center; padding: 60px;">Connecting to Wealthica...</td></tr></tbody>
    </table>
    <div class="footer">
        <select><option>All Accounts</option></select>
        <button class="btn" onclick="window.location.reload()">Refresh Data</button>
    </div>
</div>

<script>
    /* DIRECT WEALTHICA HANDSHAKE */
    (function() {
        const checkWealthica = () => {
            // Try to find the Wealthica global object
            const W = window.Wealthica || window.WealthicaAddon || (window.parent && window.parent.Wealthica);
            
            if (!W) {
                // If not found, manually signal parent we are ready to receive handshake
                window.parent.postMessage({ type: 'ready' }, '*');
                setTimeout(checkWealthica, 500);
                return;
            }

            try {
                const addon = (typeof W === 'function') ? new W() : W;
                
                addon.on('ready', async (data) => {
                    console.log("Snowball-Div: Handshake Success");
                    try {
                        const txs = await addon.api.getTransactions({ limit: 1000 });
                        render(txs);
                    } catch (e) {
                        document.getElementById('rows').innerHTML = '<tr><td colspan="3" style="padding:40px; color:red;">Permission Error: Please enable Transaction access.</td></tr>';
                    }
                });
            } catch (err) {
                console.error("Snowball-Div: Initialization Error", err);
            }
        };

        function render(txs) {
            const divs = {};
            let grand = 0;
            const years = {};
            const curY = new Date().getFullYear();
            for(let i=0; i<4; i++) years[curY-i] = 0;

            const filtered = txs.filter(t => ['dividend','distribution','interest'].includes(t.type?.toLowerCase()));

            if (!filtered.length) {
                document.getElementById('rows').innerHTML = '<tr><td colspan="3" style="text-align:center; padding:40px;">No dividend data found.</td></tr>';
                return;
            }

            filtered.forEach(t => {
                const s = t.symbol || 'OTHER';
                const a = Math.abs(parseFloat(t.amount) || 0);
                const y = new Date(t.date).getFullYear();

                if (!divs[s]) divs[s] = { amt: 0, name: t.description ? t.description.split('-')[0].trim() : 'Income' };
                divs[s].amt += a;
                grand += a;
                if (years[y] !== undefined) years[y] += a;
            });

            const sorted = Object.keys(divs).sort((a,b) => divs[b].amt - divs[a].amt);
            document.getElementById('rows').innerHTML = sorted.map(s => `
                <tr><td><strong>${s}</strong></td><td style="color:#64748b">${divs[s].name}</td><td style="text-align:right; font-weight:700;">$${divs[s].amt.toLocaleString(undefined, {minimumFractionDigits: 2})}</td></tr>
            `).join('');
            
            document.getElementById('grand').innerText = grand.toLocaleString(undefined, {minimumFractionDigits: 2});
            const max = Math.max(...Object.values(years)) || 1;
            document.getElementById('barChart').innerHTML = Object.keys(years).reverse().map(y => `
                <div class="bar" style="height: ${(years[y]/max)*100}%"><div class="bar-label">${y}</div></div>
            `).join('');
        }

        checkWealthica();
    })();
</script>
