<!DOCTYPE html>
<html>
<head>
    <title>Hello World Power-Up</title>
    <!-- Include the Wealthica JS library -->
    <script src="https://unpkg.com/wealthica-sdk-js/dist/wealthica.js"></script>
</head>
<body>
    <h1>Hello World!</h1>
    <p id="user-info">Loading user data...</p>

    <script>
        // Initialize the Power-Up
        const addon = new Wealthica();

        addon.on('ready', (data) => {
            // "data" contains information about the current user
            const userName = data.user.name || "Wealthica User";
            document.getElementById('user-info').innerText = `Hello, ${userName}! Your Power-Up is ready.`;
            
            // You can now use addon.api.get() to fetch balances, assets, etc.
            console.log("Power-Up initialized with data:", data);
        });
    </script>
</body>
</html>
