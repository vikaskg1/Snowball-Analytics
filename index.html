<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hello Wealthica</title>

<script src="https://unpkg.com/@wealthica/power-up-sdk@latest/dist/power-up-sdk.js"></script>

</head>

<body>

<h1>Hello Power-Up</h1>
<div id="status">Loading...</div>

<script>

window.addEventListener("load", function () {

  if (typeof WealthicaPowerUp === "undefined") {
    document.getElementById("status").innerText = "SDK failed to load";
    return;
  }

  const powerup = new WealthicaPowerUp();

  powerup.onReady(function(data){
      console.log("PowerUp Ready", data);
      document.getElementById("status").innerText =
          "Hello " + data.user.email;
  });

});

</script>

</body>
</html>
