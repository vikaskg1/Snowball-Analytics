<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hello Wealthica</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.2/iframeResizer.contentWindow.min.js"></script>

<style>
body{
  font-family: Arial;
  padding:40px;
}
</style>

</head>

<body>

<h1>Hello Wealthica Power-Up 👋</h1>
<div id="status">Waiting for container...</div>

<script>

function init(){

  if(!window.addon){
      document.getElementById("status").innerText =
        "Addon container not available";
      return;
  }

  window.addon.on("ready", function(data){

      console.log("Addon Ready", data);

      document.getElementById("status").innerText =
        "Connected to Wealthica";

  });

}

init();

</script>

</body>
</html>
