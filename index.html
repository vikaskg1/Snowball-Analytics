<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiviGrowth Pro</title>
    <!-- ONLY the essential Wealthica SDK -->
    <script src="https://wealthica.github.io"></script>
    <style>
        :root { --w-blue: #1b6ec2; --bg: #f0f2f5; --green: #28a745; --light-blue: #f9fbff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); padding: 40px; margin: 0; }
        .card { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--w-blue); color: white; padding: 18px 30px; font-size: 1.35rem; font-weight: bold; }
        
        /* Summary & Bar Chart */
        .summary-row { padding: 30px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .total-val { font-size: 2.6rem; font-weight: 800; display: flex; align-items: center; gap: 15px; margin: 5px 0; }
        .badge { background: #e6f7ed; color: var(--green); padding: 5px 12px; border-radius: 6px; font-size: 0.9rem; font-weight: bold; }
        .chart-box { display: flex; align-items: flex-end; gap: 8px; height: 80px; }
        .bar { width: 22px; background: #5a96d4; border-radius: 3px 3px 0 0; position: relative; opacity: 0.8; }
        .bar-label { position: absolute; bottom: -20px; left: -5px; width: 35px; font-size: 10px; text-align: center; color: #888; }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 40px; color: #64748b; font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #edf2f7; background: #fcfcfc; }
        td { padding: 14px 40px; border-bottom: 1px solid #f1f5f9; font-size: 1rem; }
        tr:nth-child(even) { background: var(--light-blue); }
        .amt { text-align: right; font-weight: 600; }

        /* Footer */
        .footer { padding: 25px 40px; display: flex; justify-content: space-between; background: #fff; }
        select { padding: 10px 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; background: #fff; }
        .btn { background: var(--w-blue); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">Total Dividends by Symbol</div>
    <div class="summary-row">
        <div>
            <div style="color:#64748b; font-size:0.95rem;">Total Portfolio Dividends</div>
            <div class="total-val">$<span id="grandTotal">0.00</span> <small style="font-size:1.4rem;">CAD</small> <span class="badge">+5.2% (YTD)</span></div>
        </div>
        <div class="chart-box" id="barChart"></div>
    </div>
    <table>
        <thead><tr><th>Symbol</th><th>Company</th><th style="text-align:right">Total Earned (CAD)</th></tr></thead>
        <tbody id="rows"></tbody>
    </table>
    <div class="footer">
        <select><option>All Accounts</option></select>
        <button class="btn" onclick="location.reload()">Refresh Data</button>
    </div>
</div>

<script>
    // Initialize Wealthica
    const addon = new Wealthica();
    
    addon.on('ready', async (data) => {
        try {
            const txs = await addon.api.getTransactions({ limit: 1000 });
            const divs = {};
            let grand = 0;
            const years = { '2020':0, '2021':0, '2022':0, '2023':0, '2024':0 };

            txs.filter(t => ['dividend','distribution'].includes(t.type)).forEach(t => {
                const s = t.symbol || 'OTHER';
                const y = new Date(t.date).getFullYear();
                const a = Math.abs(parseFloat(t.amount) || 0);

                if(!divs[s]) divs[s] = { amt: 0, name: t.description ? t.description.split('-')[0].trim() : 'Unknown' };
                divs[s].amt += a;
                grand += a;
                if(years[y] !== undefined) years[y] += a;
            });

            const sorted = Object.keys(divs).sort((a,b) => divs[b].amt - divs[a].amt);
            document.getElementById('rows').innerHTML = sorted.map(s => `
                <tr>
                    <td><strong>${s}</strong></td>
                    <td style="color:#64748b">${divs[s].name}</td>
                    <td class="amt">$${divs[s].amt.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                </tr>`).join('');
            
            document.getElementById('grandTotal').innerText = grand.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            // Simple CSS Bar Chart
            const max = Math.max(...Object.values(years)) || 1;
            document.getElementById('barChart').innerHTML = Object.keys(years).map(y => `
                <div class="bar" style="height: ${(years[y]/max)*100}%"><div class="bar-label">${y}</div></div>
            `).join('');

        } catch (e) { console.error("Wealthica Error:", e); }
    });
</script>
</body>
</html>
