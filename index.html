<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DiviGrowth Pro</title>
    <!-- ONLY USE WHITELISTED CDNs -->
    <script src="https://wealthica.github.io"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --w-blue: #2172d2; --bg: #f4f7f9; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); padding: 20px; }
        .card { max-width: 850px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .header { background: var(--w-blue); color: white; padding: 15px 25px; font-size: 1.2rem; font-weight: 600; }
        .stats { padding: 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .total-val { font-size: 2.2rem; font-weight: 800; }
        .badge { background: #e6f7ed; color: #166534; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; margin-left: 10px; }
        .chart-container { width: 250px; height: 100px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 25px; background: #fcfcfc; color: #64748b; font-size: 0.8rem; border-bottom: 1px solid #eee; }
        td { padding: 12px 25px; border-bottom: 1px solid #f9f9f9; font-size: 0.95rem; }
        tr:nth-child(even) { background: #fbfcfe; }
        .footer { padding: 20px; display: flex; justify-content: space-between; background: white; }
        select { padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; }
        .btn { background: var(--w-blue); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">Total Dividends by Symbol</div>
    <div class="stats">
        <div>
            <div style="color:#64748b; font-size:0.9rem;">Total Portfolio Dividends</div>
            <div class="total-val">$<span id="grandTotal">0.00</span> <small>CAD</small> <span class="badge">+5.2% (YTD)</span></div>
        </div>
        <div class="chart-container"><canvas id="miniChart"></canvas></div>
    </div>
    <table>
        <thead><tr><th>Symbol</th><th>Company</th><th style="text-align:right">Total Earned (CAD)</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div class="footer">
        <select id="accs"><option>All Accounts</option></select>
        <button class="btn" onclick="location.reload()">Refresh Data</button>
    </div>
</div>

<script>
    const addon = new Wealthica();
    addon.on('ready', async (data) => {
        const txs = await addon.api.getTransactions({ limit: 1000 });
        const divs = {};
        let grand = 0;

        txs.filter(t => ['dividend','distribution'].includes(t.type)).forEach(t => {
            const s = t.symbol || 'CASH';
            if(!divs[s]) divs[s] = { amt: 0, name: t.description.split('-')[0] };
            divs[s].amt += Math.abs(t.amount);
            grand += Math.abs(t.amount);
        });

        const sorted = Object.keys(divs).sort((a,b) => divs[b].amt - divs[a].amt);
        document.getElementById('tableBody').innerHTML = sorted.map(s => `
            <tr>
                <td><strong>${s}</strong></td>
                <td style="color:#666">${divs[s].name}</td>
                <td style="text-align:right; font-weight:bold;">$${divs[s].amt.toLocaleString()}</td>
            </tr>`).join('');
        
        document.getElementById('grandTotal').innerText = grand.toLocaleString();
        renderChart();
    });

    function renderChart() {
        new Chart(document.getElementById('miniChart'), {
            type: 'bar',
            data: { labels: ['2021','2022','2023','2024'], datasets: [{ data:, backgroundColor: '#2172d2', borderRadius: 4 }] },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: true, grid: { display: false } }, y: { display: false } } }
        });
    }
</script>
</body>
</html>
