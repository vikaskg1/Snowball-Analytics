<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hello World Power-Up</title>
    <!-- 1. MANDATORY: The iframe-resizer script allows Wealthica to talk to your app -->
    <script src="https://cdnjs.cloudflare.com"></script>
    
    <!-- 2. The Wealthica Power-Up SDK -->
    <script src="https://wealthica.github.io"></script>
    
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fff; }
        .box { border: 1px solid #eee; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="box">
        <h1 id="title">Initializing...</h1>
        <p id="msg">Waiting for Wealthica connection...</p>
    </div>

    <script>
        // Ensure scripts are loaded before initializing
        window.onload = function() {
            if (typeof Wealthica !== 'undefined') {
                try {
                    // Create the addon instance
                    const addon = new Wealthica();

                    // Listen for the 'ready' event
                    addon.on('ready', function(data) {
                        console.log("Connected to Wealthica!", data);
                        
                        document.getElementById('title').innerText = "Hello World!";
                        const name = data.user.name || "Wealthica User";
                        document.getElementById('msg').innerHTML = 
                            `Welcome, <strong>${name}</strong>. Your Power-Up is now linked!`;
                    });
                } catch (e) {
                    console.error("Initialization failed:", e);
                    document.getElementById('title').innerText = "Load Error";
                }
            } else {
                document.getElementById('title').innerText = "SDK Missing";
            }
        };
    </script>
</body>
</html>
