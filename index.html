<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Snowball Dividend</title>

<!-- Required for Wealthica iframe resizing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.2/iframeResizer.contentWindow.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  padding:40px;
}
</style>

</head>

<body>

<h1>Snowball Dividend Power-Up</h1>
<div id="status">Waiting for Wealthica...</div>

<script>

function start(){

  if (!window.addon) {
    document.getElementById("status").innerText =
      "Running outside Wealthica container";
    return;
  }

  window.addon.on("ready", function(data){

    console.log("Wealthica container ready", data);

    document.getElementById("status").innerText =
      "Connected to Wealthica successfully";

  });

}

start();

</script>

</body>
</html>
